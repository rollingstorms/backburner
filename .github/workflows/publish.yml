name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust components
        run: rustup component add clippy rustfmt

      - name: Verify tag matches Cargo version
        shell: bash
        run: |
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "backburner") | .version')"
          expected="v${version}"
          actual="${GITHUB_REF_NAME}"

          if [[ "${actual}" != "${expected}" ]]; then
            echo "Tag ${actual} does not match Cargo.toml version ${expected}."
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Dry run publish
        run: cargo publish --dry-run --locked

      - name: Check crates.io version
        id: crates
        shell: bash
        run: |
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "backburner") | .version')"
          if curl -fsS -o /dev/null "https://crates.io/api/v1/crates/backburner/${version}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "backburner ${version} already exists on crates.io; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate with crates.io
        id: auth
        if: steps.crates.outputs.exists != 'true'
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crate
        if: steps.crates.outputs.exists != 'true'
        run: cargo publish --locked --token "${{ steps.auth.outputs.token }}"
